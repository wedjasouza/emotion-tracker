<!DOCTYPE html>
<html>
    <head>
	    <title>Emotion Tracker</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
	</head>
	<body>
	    <div class="container">
		    <h1 class="display-4 mt-4 mb-4 text-center">Sentiment and Emotion Tracker</h1>
		    <form id="emotionForm">
			    <div class="mb-3 mt-3">
			        <label for="textToAnalyze">Text to Analyze:</label>
					<textarea class="form-control" rows="5" id="textToAnalyze" name="text"></textarea>
				</div>
			    <button type="submit" class="btn btn-primary">SUBMIT</button>
			</form>
			<div class="mt-4" id="result"></div>
			<h3 class="mt-5">History</h3>
			<div id="history"></div>
		</div>
		<script src="/static/app.js"></script>
	</body>
</html>
